<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIETROBLOX | Dịch Vụ Cày Thuê Uy Tín</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .modal { transition: opacity 0.25s ease; }
        body.modal-active { overflow: hidden; }
        input::placeholder { color: #64748b; }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans">

    <nav class="p-4 bg-slate-800 shadow-xl sticky top-0 z-50 border-b border-yellow-500/20">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-yellow-400 uppercase tracking-tighter cursor-pointer" onclick="location.reload()">KIET<span class="text-white">ROBLOX</span></h1>
            <div id="nav-auth-buttons" class="flex items-center space-x-4">
                <button onclick="toggleModal('login-modal')" class="border border-yellow-500 text-yellow-500 px-4 py-1.5 rounded-lg font-bold hover:bg-yellow-500 hover:text-black transition text-sm text-yellow-400">Đăng Nhập</button>
                <button onclick="toggleModal('register-modal')" class="bg-yellow-500 text-black px-4 py-1.5 rounded-lg font-bold hover:bg-yellow-400 transition text-sm">Đăng Ký</button>
            </div>
        </div>
    </nav>

    <header class="py-16 px-4 text-center">
        <h2 class="text-5xl font-black mb-4 italic tracking-tight uppercase">CÀY THUÊ <span class="text-yellow-500 font-extrabold text-6xl">UY TÍN</span></h2>
        <p class="text-gray-400 max-w-xl mx-auto italic">Hệ thống cày thuê thủ công cho game thủ Roblox. Bảo mật tuyệt đối.</p>
    </header>

    <section class="container mx-auto px-4 py-8">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-4xl mx-auto">
            <div class="bg-slate-800 border border-slate-700 rounded-3xl overflow-hidden hover:border-yellow-500/50 transition-all shadow-2xl">
                <img src="https://via.placeholder.com/600x330/1e293b/fbbf24?text=CAY+LEVEL+MAX" class="w-full h-48 object-cover">
                <div class="p-6 text-center">
                    <h4 class="text-xl font-bold mb-4 uppercase">Cày Level Max</h4>
                    <span class="text-yellow-400 font-black text-2xl">20,000đ</span>
                    <button onclick="openOrderModal('Cày Level Max')" class="w-full mt-4 bg-white text-black hover:bg-yellow-500 py-3 rounded-xl font-black transition uppercase">Đặt Hàng Ngay</button>
                </div>
            </div>

            <div class="bg-slate-800 border border-slate-700 rounded-3xl overflow-hidden hover:border-yellow-500/50 transition-all shadow-2xl">
                <img src="https://via.placeholder.com/600x330/1e293b/fbbf24?text=LAY+VAT+PHAM+HIEM" class="w-full h-48 object-cover">
                <div class="p-6 text-center">
                    <h4 class="text-xl font-bold mb-4 uppercase text-yellow-500">Lấy Vật Phẩm Hiếm</h4>
                    <span class="text-white font-black text-2xl">50,000đ</span>
                    <button onclick="openOrderModal('Lấy Vật Phẩm Hiếm')" class="w-full mt-4 bg-yellow-500 text-black hover:bg-yellow-400 py-3 rounded-xl font-black transition uppercase italic">Săn Đồ Ngay</button>
                </div>
            </div>
        </div>
    </section>

    <div id="order-modal" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center z-[110]">
        <div class="absolute w-full h-full bg-black opacity-90" onclick="toggleModal('order-modal')"></div>
        <div class="bg-slate-800 w-11/12 md:max-w-md mx-auto rounded-3xl p-8 border-2 border-yellow-500 z-[111]">
            <h2 id="order-title" class="text-xl font-black text-yellow-400 mb-2 uppercase italic text-center underline">XÁC NHẬN ĐẶT HÀNG</h2>
            <form onsubmit="handleOrder(event)">
                <input id="order-service" type="hidden">
                
                <div id="item-input-container" class="mb-4 hidden">
                    <label class="text-xs font-bold text-yellow-500 ml-2 uppercase">Tên vật phẩm cần lấy</label>
                    <input id="order-item-name" type="text" placeholder="Ví dụ: CDK, Soul Guitar, Godhuman..." class="w-full px-4 py-3 rounded-xl bg-slate-900 border-2 border-yellow-500 outline-none focus:bg-slate-950 transition text-white">
                </div>

                <div class="mb-4">
                    <label class="text-xs font-bold text-gray-500 ml-2">USER ROBLOX</label>
                    <input id="order-acc" type="text" placeholder="Username hoặc Email Roblox..." class="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-700 outline-none focus:border-yellow-500 text-white" required>
                </div>
                <div class="mb-6">
                    <label class="text-xs font-bold text-gray-500 ml-2">PASS ROBLOX</label>
                    <input id="order-pass" type="password" placeholder="Mật khẩu tài khoản..." class="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-700 outline-none focus:border-yellow-500 text-white" required>
                </div>
                <button type="submit" class="w-full bg-red-600 hover:bg-red-500 text-white font-black py-4 rounded-xl uppercase shadow-xl transition transform active:scale-95">Gửi Đơn Hàng</button>
            </form>
        </div>
    </div>

    <div id="login-modal" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center z-[100]">
        <div class="absolute w-full h-full bg-black opacity-80" onclick="toggleModal('login-modal')"></div>
        <div class="bg-slate-800 w-11/12 md:max-w-md mx-auto rounded-3xl p-8 border border-slate-700 z-[101]">
            <h2 class="text-2xl font-black text-yellow-400 mb-6 uppercase text-center">Đăng Nhập</h2>
            <form onsubmit="handleLogin(event)">
                <input id="login-email" type="text" placeholder="Tên tài khoản..." class="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-700 mb-4 outline-none focus:border-yellow-500 text-white" required>
                <input id="login-pass" type="password" placeholder="Mật khẩu..." class="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-700 mb-6 outline-none focus:border-yellow-500 text-white" required>
                <button type="submit" class="w-full bg-yellow-500 hover:bg-yellow-400 text-black font-black py-3 rounded-xl uppercase transition">Vào Shop</button>
            </form>
        </div>
    </div>

    <div id="register-modal" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center z-[100]">
        <div class="absolute w-full h-full bg-black opacity-80" onclick="toggleModal('register-modal')"></div>
        <div class="bg-slate-800 w-11/12 md:max-w-md mx-auto rounded-3xl p-8 border border-slate-700 z-[101]">
            <h2 class="text-2xl font-black text-yellow-400 mb-6 uppercase text-center">Đăng Ký</h2>
            <form onsubmit="handleRegister(event)">
                <input id="reg-email" type="text" placeholder="Nhập tên tài khoản..." class="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-700 mb-4 outline-none focus:border-yellow-500 text-white" required>
                <input id="reg-pass" type="password" placeholder="Mật khẩu (ít nhất 6 ký tự)..." class="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-700 mb-6 outline-none focus:border-yellow-500 text-white" required>
                <button type="submit" class="w-full bg-white hover:bg-yellow-500 text-black font-black py-3 rounded-xl uppercase transition">Tạo Tài Khoản</button>
            </form>
        </div>
    </div>

    <footer class="bg-black py-10 mt-20 text-center border-t border-slate-800">
        <p class="text-yellow-500 font-bold uppercase tracking-widest text-yellow-500">KIETROBLOX</p>
        <p class="text-gray-600 text-[10px] mt-2 italic tracking-widest">Dịch Vụ Cày Thuê Uy Tín Hàng Đầu Việt Nam</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // CONFIG CỦA BẠN (Đã khớp với hình bạn chụp)
        const firebaseConfig = {
            apiKey: "AIzaSyD0xb0EU0CGfa2mC-b7RwNji3qSdX8PUg4",
            authDomain: "kietroblox-auth.firebaseapp.com",
            projectId: "kietroblox-auth",
            storageBucket: "kietroblox-auth.firebasestorage.app",
            messagingSenderId: "781654503494",
            appId: "1:781654503494:web:ce1ced73898d37f0bd1a47",
            measurementId: "G-CFD0QVDHHB"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUser = null;

        // Xử lý Modal
        window.toggleModal = (id) => {
            const m = document.getElementById(id);
            if(m) {
                m.classList.toggle('opacity-0');
                m.classList.toggle('pointer-events-none');
                document.body.classList.toggle('modal-active');
            }
        };

        window.openOrderModal = (serviceName) => {
            if (!currentUser) {
                alert("Hãy đăng nhập trước khi đặt hàng bạn nhé!");
                toggleModal('login-modal');
                return;
            }
            document.getElementById('order-title').innerText = "ĐẶT: " + serviceName;
            document.getElementById('order-service').value = serviceName;
            
            const itemInput = document.getElementById('item-input-container');
            if(serviceName === 'Lấy Vật Phẩm Hiếm') {
                itemInput.classList.remove('hidden');
                document.getElementById('order-item-name').required = true;
            } else {
                itemInput.classList.add('hidden');
                document.getElementById('order-item-name').required = false;
                document.getElementById('order-item-name').value = ""; 
            }
            toggleModal('order-modal');
        };

        // Auth Logic
        window.handleRegister = async (e) => {
            e.preventDefault();
            const u = document.getElementById('reg-email').value;
            const p = document.getElementById('reg-pass').value;
            const email = u.includes('@') ? u : u + "@kietroblox.com";
            try {
                await createUserWithEmailAndPassword(auth, email, p);
                alert("Đăng ký thành công!");
                location.reload();
            } catch (err) { alert("Lỗi: " + err.message); }
        };

        window.handleLogin = async (e) => {
            e.preventDefault();
            const u = document.getElementById('login-email').value;
            const p = document.getElementById('login-pass').value;
            const email = u.includes('@') ? u : u + "@kietroblox.com";
            try {
                await signInWithEmailAndPassword(auth, email, p);
                alert("Đăng nhập thành công!");
                location.reload();
            } catch (err) { alert("Sai tài khoản hoặc mật khẩu!"); }
        };

        window.handleLogout = () => signOut(auth).then(() => location.reload());

        // LOGIC ĐẶT HÀNG (Bản sửa lỗi chính thức)
        window.handleOrder = async (e) => {
            e.preventDefault();
            const service = document.getElementById('order-service').value;
            const acc = document.getElementById('order-acc').value;
            const pass = document.getElementById('order-pass').value;
            const itemName = document.getElementById('order-item-name').value;

            try {
                await addDoc(collection(db, "orders"), {
                    customerEmail: currentUser.email,
                    service: service,
                    itemName: service === 'Lấy Vật Phẩm Hiếm' ? itemName : "Không có (Cày Level)",
                    robloxAcc: acc,
                    robloxPass: pass,
                    status: "Đang chờ",
                    time: serverTimestamp()
                });
                alert("Đặt hàng thành công! Hãy kiểm tra Firebase nhé.");
                toggleModal('order-modal');
                
                // Reset form
                document.getElementById('order-item-name').value = "";
                document.getElementById('order-acc').value = "";
                document.getElementById('order-pass').value = "";
            } catch (err) { alert("Lỗi gửi đơn: " + err.message); }
        };

        // Theo dõi trạng thái đăng nhập
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            const area = document.getElementById('nav-auth-buttons');
            if (user) {
                const name = user.email.split('@')[0];
                area.innerHTML = `
                    <div class="text-right">
                        <p class="text-yellow-400 font-bold text-sm">Chào, ${name}</p>
                        <button onclick="handleLogout()" class="text-[10px] uppercase text-gray-500 underline hover:text-white">Thoát</button>
                    </div>`;
            }
        });
    </script>
</body>
</html>
